# ------------------------
# BESC Hyperchain RPC Node
# hyper.beschyperchain.com
# ------------------------

# Data directory
data-path="/var/lib/besu"

# Custom network
genesis-file="/etc/besu/genesis.json"
network-id=2372

# P2P
p2p-host="38.83.53.66"
p2p-port=30303
static-nodes-file="/etc/besu/static-nodes.json"
discovery-enabled=false

# Sync
sync-mode="FULL"

# ---------- HTTP RPC ----------
rpc-http-enabled=true
rpc-http-host="0.0.0.0"
rpc-http-port=8545
rpc-http-api=["ETH","NET","WEB3","TRACE","DEBUG","TXPOOL","ADMIN"]
rpc-http-cors-origins=["*"]
host-allowlist=["*"]
rpc-http-max-active-connections=5000

# ---------- WebSocket RPC ----------
rpc-ws-enabled=true
rpc-ws-host="0.0.0.0"
rpc-ws-port=8546
rpc-ws-api=["ETH","NET","WEB3","TXPOOL"]
rpc-ws-max-active-connections=5000

# ---------- Gas Settings ----------
min-gas-price=1000000000000
api-gas-price-max=25809520000000

# Logging
logging="INFO"

max-peers=1
sync-min-peers=1
bonsai-historical-block-limit=1555536
bonsai-trie-logs-pruning-window-size=2000000
